name: Likes
version: ${version}
main: dev.example.likes.LikesPlugin
api-version: "1.21"
description: "In-game likes and reactions for positive community vibes."

commands:
  like:
    usage: "/like <player> <reason...> | /like boost [shortId] | /like recent"

permissions:
  likes.use:
    default: true
  likes.admin:
    default: op
  likes.limit.bypass:
    default: op
